<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - Cheer Elite Audio</title>
  <link rel="icon" type="image/png" href="../../assets/images/tablogo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Karla:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/login.css" />
</head>
<body>

<div class="login-card">
  <div class="login-logo">
    <img src="../../assets/images/logo.png" alt="Cheer Elite Audio" />
  </div>
  <h1>Admin Panel</h1>
  <p>Cheer Elite Audio · internal dashboard</p>

  <div class="input-wrap">
    <svg viewBox="0 0 20 20" fill="none"><path d="M3 8a7 7 0 1114 0A7 7 0 013 8zm7 3v6M7 17h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    <input id="admin-email" type="email" placeholder="Admin email" autocomplete="username" />
  </div>
  <div class="input-wrap">
    <svg viewBox="0 0 20 20" fill="none"><rect x="4" y="9" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 9V7a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    <input id="admin-password" type="password" placeholder="Password" autocomplete="current-password" />
  </div>

  <button id="login-btn">Sign In</button>
  <p id="login-error">Wrong email or password. Try again.</p>

  <p class="login-footer">Cheer Elite Audio © 2025</p>
</div>

<script type="module" src="../js/login.js"></script>

</body>
</html>
